<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aviso Trabalhado · Fat Buddha Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--c:#EDD9C7;--r:#C0392B;--d:#2C1A0E;--m:#7A5C48;--l:#F9F4EF}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,sans-serif;background:var(--l);color:var(--d)}
#auth{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#2C1A0E,#7A5C48)}
.ab{background:#fff;border-radius:14px;padding:40px;text-align:center;max-width:360px;width:100%;box-shadow:0 16px 48px rgba(0,0,0,.2)}
.ab h1{font-size:19px;font-weight:700;margin-bottom:4px}.ab p{font-size:13px;color:var(--m);margin-bottom:24px}
.gb{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px 18px;border:2px solid #e5e7eb;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;font-weight:500;color:#374151}
.gb:hover{border-color:var(--r);color:var(--r)}
#app{display:none}
.hdr{background:#fff;border-bottom:2px solid var(--c);padding:0 20px;display:flex;align-items:center;gap:12px;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.hb{padding:5px 10px;border:1px solid var(--c);border-radius:5px;background:var(--l);font-size:12px;color:var(--m);text-decoration:none}
.ta h1{font-size:15px;font-weight:700}.ta p{font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.4px}
.hr{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--m)}
.so{padding:5px 12px;border:1px solid var(--c);border-radius:5px;background:none;font-size:12px;color:var(--m);cursor:pointer}
.nav{background:#fff;border-bottom:1px solid var(--c);padding:0 20px;display:flex}
.nb{padding:11px 16px;border:none;background:none;font-size:13px;font-weight:500;color:var(--m);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.nb.a{color:var(--r);border-bottom-color:var(--r);font-weight:600}
.con{padding:20px;max-width:1300px;margin:0 auto}
.vi{display:none}.vi.a{display:block}
.krow{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:#fff;border-radius:8px;padding:16px;border:1px solid var(--c)}
.kv{font-size:28px;font-weight:700}.kl{font-size:11px;margin-top:2px;opacity:.75}
.cc{background:#fff;border-radius:8px;padding:16px;border:1px solid var(--c);margin-bottom:16px}
.cc h3{font-size:12px;font-weight:600;color:var(--m);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px}
.mt{width:100%;border-collapse:collapse;font-size:13px}
.mt th{padding:9px 10px;text-align:left;background:var(--c);font-size:11px;font-weight:600}
.mt td{padding:9px 10px;border-bottom:1px solid var(--c)}
.bf{height:7px;border-radius:3px}
.fb{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:flex-end}
.fb select,.fb input{padding:7px 10px;border:1px solid var(--c);border-radius:5px;font-size:13px;background:#fff}
.fl{font-size:11px;color:var(--m);display:block;margin-bottom:3px}
.fg{display:flex;flex-direction:column}
.tw{background:#fff;border-radius:8px;border:1px solid var(--c);overflow:hidden}
.dt{width:100%;border-collapse:collapse;font-size:13px}
.dt th{padding:10px 12px;text-align:left;background:var(--c);font-size:11px;font-weight:600;white-space:nowrap}
.dt td{padding:10px 12px;border-bottom:1px solid var(--c)}
.dt tbody tr:hover{background:var(--l)}
.badge{display:inline-block;padding:2px 8px;border-radius:18px;font-size:11px;font-weight:600}
.ba{background:#fff3cd;color:#856404}.bc{background:#dcfce7;color:#15803d}.bv{background:#fee2e2;color:#991b1b}
.btn{padding:8px 16px;border-radius:5px;border:none;cursor:pointer;font-size:13px;font-weight:600}
.bp{background:var(--r);color:#fff}.bo{background:none;border:1px solid var(--r);color:var(--r)}
.bs{padding:3px 8px;font-size:11px;border-radius:4px}
.be{background:none;border:1px solid var(--m);color:var(--m)}
.bd{background:none;border:1px solid #dc2626;color:#dc2626}
.bk{background:none;border:1px solid #15803d;color:#15803d}
.mo{display:none;position:fixed;inset:0;background:rgba(44,26,14,.42);z-index:9999;align-items:center;justify-content:center;padding:16px}
.mo.o{display:flex}
.mb{background:#fff;border-radius:10px;width:100%;max-width:500px;padding:24px;box-shadow:0 6px 24px rgba(0,0,0,.18);max-height:90vh;overflow-y:auto}
.mb h2{font-size:16px;font-weight:700;margin-bottom:16px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg2{margin-bottom:12px}
.fg2 label{display:block;font-size:11px;font-weight:600;color:var(--m);margin-bottom:4px;text-transform:uppercase}
.fg2 input,.fg2 select{width:100%;padding:8px 10px;border:1px solid var(--c);border-radius:5px;font-size:13px;font-family:inherit}
.rg{display:flex;flex-direction:column;gap:6px}
.ro{display:flex;align-items:flex-start;gap:6px;cursor:pointer;font-size:13px;padding:7px;border:1px solid var(--c);border-radius:5px}
.ro:hover{background:var(--l)}
.rl{font-weight:500;font-size:13px}.rd{font-size:11px;color:var(--m)}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--c)}
.yb{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.sh h2{font-size:15px;font-weight:700}
.es{text-align:center;padding:32px;color:#aaa;font-size:14px}
</style>
</head>
<body>
<div id="auth">
 <div class="ab">
  <div style="font-size:40px;margin-bottom:12px">🍊</div>
  <h1>Aviso Trabalhado</h1>
  <p>Fat Buddha · Gestão de Desligamentos</p>
  <button class="gb" onclick="sIn()">
   <svg width="17" height="17" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/></svg>
   Entrar com Google
  </button>
 </div>
</div>
<div id="app">
 <div class="hdr">
  <a href="index.html" class="hb">← Hub</a>
  <div style="font-size:22px">🍊</div>
  <div class="ta"><h1>Aviso Trabalhado</h1><p>Fat Buddha · Desligamentos</p></div>
  <div class="hr"><span id="ue"></span><button class="so" onclick="sOut()">Sair</button></div>
 </div>
 <nav class="nav">
  <button class="nb a" onclick="sv('d',this)">📊 Dashboard</button>
  <button class="nb" onclick="sv('r',this)">📋 Registros</button>
 </nav>
 <div class="con">
  <div id="vd" class="vi a">
   <div class="yb">
    <label style="font-size:13px;font-weight:600;color:var(--m)">Ano:</label>
    <select id="fy" onchange="rD()" style="padding:5px 10px;border:1px solid var(--c);border-radius:5px;font-size:13px"></select>
    <label style="font-size:13px;font-weight:600;color:var(--m);margin-left:10px">Loja:</label>
    <select id="fl" onchange="rD()" style="padding:5px 10px;border:1px solid var(--c);border-radius:5px;font-size:13px"><option value="">Todas</option></select>
   </div>
   <div class="krow" id="kr"></div>
   <div class="cc"><h3>Motivos de Desligamento</h3><table class="mt" id="mtt"><thead><tr><th>Motivo</th><th>Qtd</th><th>%</th><th style="min-width:100px">Barra</th><th>Concluídos</th><th>Andamento</th></tr></thead><tbody></tbody></table></div>
  </div>
  <div id="vr" class="vi">
   <div class="sh"><h2>📋 Registros de Aviso Trabalhado</h2><button class="btn bp" onclick="oM()">+ Novo</button></div>
   <div class="fb">
    <div class="fg"><span class="fl">Status</span><select id="fs" onchange="rT()"><option value="">Todos</option><option value="Em Andamento">Em Andamento</option><option value="Concluido">Concluído</option></select></div>
    <div class="fg"><span class="fl">Motivo</span><select id="fm" onchange="rT()"><option value="">Todos</option><option value="empresa23dias">Empresa 23d</option><option value="empresaReducao2h">Empresa 2h red.</option><option value="colaborador">Colaborador 30d</option><option value="contratExperiencia">Contrato Exp.</option></select></div>
    <div class="fg"><span class="fl">Loja</span><select id="fj" onchange="rT()"><option value="">Todas</option></select></div>
    <div class="fg"><span class="fl">Buscar</span><input type="text" id="fb2" placeholder="Nome..." oninput="rT()"></div>
   </div>
   <div class="tw"><table class="dt"><thead><tr><th>Colaborador</th><th>Loja</th><th>Início</th><th>Fim</th><th>Dias</th><th>Motivo</th><th>Status</th><th>Ações</th></tr></thead><tbody id="tb"></tbody></table></div>
  </div>
 </div>
</div>
<div class="mo" id="mo">
 <div class="mb">
  <h2 id="mt2">Novo Registro</h2>
  <input type="hidden" id="ei">
  <div class="fr">
   <div class="fg2"><label>Nome *</label><input type="text" id="fn" placeholder="Nome completo"></div>
   <div class="fg2"><label>Loja</label><select id="flo"><option value="">Selecione</option><option>MATRIZ</option><option>BROOKLIN</option><option>PERDIZES</option><option>VILA MARIANA</option><option>HIGIENÓPOLIS</option><option>PINHEIROS</option><option>ITAIM</option></select></div>
  </div>
  <div class="fg2"><label>Motivo *</label><div class="rg">
   <label class="ro"><input type="radio" name="mot" value="empresa23dias" onchange="cDF()"><div><div class="rl">🏢 Empresa — 23 dias</div><div class="rd">Colaborador reduz 7 dias</div></div></label>
   <label class="ro"><input type="radio" name="mot" value="empresaReducao2h" onchange="cDF()"><div><div class="rl">🏢 Empresa — 30 dias com 2h redução diária</div><div class="rd">Trabalha 30 dias com 2h a menos/dia</div></div></label>
   <label class="ro"><input type="radio" name="mot" value="colaborador" onchange="cDF()"><div><div class="rl">👤 A pedido do colaborador — 30 dias</div><div class="rd">Colaborador cumpre aviso completo</div></div></label>
   <label class="ro"><input type="radio" name="mot" value="contratExperiencia" onchange="cDF()"><div><div class="rl">📄 Encerramento de contrato de experiência</div><div class="rd">Término natural do contrato</div></div></label>
  </div></div>
  <div class="fr">
   <div class="fg2"><label>Data Início *</label><input type="date" id="di" onchange="cDF()"></div>
   <div class="fg2"><label>Data Fim</label><input type="date" id="df"></div>
  </div>
  <div class="fr">
   <div class="fg2"><label>Status</label><select id="fst"><option value="Em Andamento">Em Andamento</option><option value="Concluido">Concluído</option></select></div>
   <div class="fg2"><label>Observações</label><input type="text" id="fo" placeholder="Opcional"></div>
  </div>
  <div class="mf"><button class="btn bo" onclick="cM()">Cancelar</button><button class="btn bp" onclick="sR()">Salvar</button></div>
 </div>
</div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyCyMw54A5hb1uiOypt5mABVxo96aUNLZtw",authDomain:"fat-buddha-hub.firebaseapp.com",databaseURL:"https://fat-buddha-hub-default-rtdb.firebaseio.com",projectId:"fat-buddha-hub",storageBucket:"fat-buddha-hub.firebasestorage.app",messagingSenderId:"748093225714",appId:"1:748093225714:web:58c7e22c7b588b797eee6b"});
const auth=firebase.auth(),db=firebase.database(),ae=['rh@fatbuddha.com.br','admin@fatbuddha.com.br'];
function sIn(){auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>alert(e.message));}
function sOut(){auth.signOut();}
auth.onAuthStateChanged(u=>{
 if(u&&ae.includes(u.email)){document.getElementById('auth').style.display='none';document.getElementById('app').style.display='block';document.getElementById('ue').textContent=u.email;lD();}
 else{document.getElementById('auth').style.display='flex';document.getElementById('app').style.display='none';if(u){auth.signOut();alert('Acesso não autorizado.');}}
});
let recs={};
const ML={empresa23dias:'Empresa — 23 dias',empresaReducao2h:'Empresa — 2h redução',colaborador:'Colaborador (30d)',contratExperiencia:'Contrato Experiência'};
const MC={empresa23dias:'#C0392B',empresaReducao2h:'#e67e22',colaborador:'#27ae60',contratExperiencia:'#2980b9'};
function lD(){
 db.ref('avisos_trabalhados').on('value',s=>{
  recs=s.val()||{};
  rD();rT();pF();pY();
 });
}
function pY(){
 const s=document.getElementById('fy'),y=new Set(),c=new Date().getFullYear();
 Object.values(recs).forEach(r=>{if(r.dataInicio)y.add(r.dataInicio.substring(0,4));});
 y.add(String(c));
 const p=s.value||String(c);
 s.innerHTML=[...y].sort().reverse().map(v=>`<option value="${v}"${v===p?' selected':''}>${v}</option>`).join('');
}
function pF(){
 const ls=new Set();Object.values(recs).forEach(r=>{if(r.loja)ls.add(r.loja);});
 ['fl','fj'].forEach(id=>{const s=document.getElementById(id),p=s.value;s.innerHTML='<option value="">Todas</option>';[...ls].sort().forEach(l=>s.innerHTML+=`<option value="${l}"${l===p?' selected':''}>${l}</option>`);s.value=p;});
}
function rD(){
 const yr=document.getElementById('fy').value,lj=document.getElementById('fl').value;
 const all=Object.values(recs),h=new Date();h.setHours(0,0,0,0);
 const f=all.filter(r=>{
  if(yr&&(!r.dataInicio||!r.dataInicio.startsWith(yr)))return false;
  if(lj&&r.loja!==lj)return false;return true;
 });
 let tot=0,and=0,con=0,ven=0;const bt={},bl={};
 f.forEach(r=>{
  tot++;const fim=r.dataFim?new Date(r.dataFim+'T00:00:00'):null;
  const d=fim?Math.ceil((fim-h)/86400000):99;
  if(r.status==='Concluido')con++;else if(d<=0)ven++;else and++;
  bt[r.motivo]=(bt[r.motivo]||0)+1;
  if(r.loja&&r.loja!=='-')bl[r.loja]=(bl[r.loja]||0)+1;
 });
 const kp=[{v:tot,l:'Total no Ano',c:'#2C1A0E'},{v:and,l:'Em Andamento',c:'#856404',b:'#fff3cd'},{v:con,l:'Concluídos',c:'#15803d',b:'#dcfce7'},{v:ven,l:'Vencidos',c:'#991b1b',b:'#fee2e2'}];
 document.getElementById('kr').innerHTML=kp.map(k=>`<div class="kpi" style="background:${k.b||'#fff'}"><div class="kv" style="color:${k.c}">${k.v}</div><div class="kl" style="color:${k.c}">${k.l}</div></div>`).join('');
 const mc={},ma={};
 f.forEach(r=>{if(r.motivo){if(r.status==='Concluido')mc[r.motivo]=(mc[r.motivo]||0)+1;else ma[r.motivo]=(ma[r.motivo]||0)+1;}});
 document.querySelector('#mtt tbody').innerHTML=['empresa23dias','empresaReducao2h','colaborador','contratExperiencia'].map(k=>{
  const q=bt[k]||0,p=tot>0?Math.round(q/tot*100):0;
  return`<tr><td><span style="display:inline-block;width:9px;height:9px;background:${MC[k]};border-radius:50%;margin-right:6px"></span>${ML[k]}</td><td><b>${q}</b></td><td>${p}%</td><td><div style="background:#f5ede6;border-radius:3px;height:7px;width:100px"><div class="bf" style="width:${p}%;background:${MC[k]}"></div></div></td><td style="color:#15803d;font-weight:600">${mc[k]||0}</td><td style="color:#856404;font-weight:600">${ma[k]||0}</td></tr>`;
 }).join('');
}
function rT(){
 const fS=document.getElementById('fs').value,fM=document.getElementById('fm').value,fJ=document.getElementById('fj').value,fB=(document.getElementById('fb2').value||'').toLowerCase();
 const h=new Date();h.setHours(0,0,0,0);
 const list=Object.entries(recs).map(([id,r])=>({id,...r})).filter(r=>{
  if(fS&&r.status!==fS)return false;if(fM&&r.motivo!==fM)return false;
  if(fJ&&r.loja!==fJ)return false;if(fB&&!(r.nome||'').toLowerCase().includes(fB))return false;return true;
 }).sort((a,b)=>(b.dataInicio||'').localeCompare(a.dataInicio||''));
 const tb=document.getElementById('tb');
 if(!list.length){tb.innerHTML='<tr><td colspan="8" class="es">Nenhum registro encontrado</td></tr>';return;}
 tb.innerHTML=list.map(r=>{
  const fim=r.dataFim?new Date(r.dataFim+'T00:00:00'):null,d=fim?Math.ceil((fim-h)/86400000):null;
  let ds='-',bc='ba';
  if(r.status==='Concluido'){ds='-';bc='bc';}
  else if(d!==null){if(d<0){ds='Vencido';bc='bv';}else if(d===0){ds='Hoje';}else{ds=d+' dias';}}
  return`<tr><td style="font-weight:500">${r.nome||'-'}</td><td style="color:var(--m)">${r.loja||'-'}</td><td>${fd(r.dataInicio)}</td><td>${fd(r.dataFim)}</td><td>${ds}</td><td style="font-size:12px">${ML[r.motivo]||r.motivo||'-'}</td><td><span class="badge ${bc}">${r.status==='Concluido'?'Concluído':r.status||'-'}</span></td><td style="white-space:nowrap">${r.status!=='Concluido'?`<button class="btn bs bk" onclick="co('${r.id}')">✓</button> `:''}<button class="btn bs be" onclick="eR('${r.id}')">✎</button> <button class="btn bs bd" onclick="dR('${r.id}')">✕</button></td></tr>`;
 }).join('');
}
function fd(s){if(!s)return'-';const p=s.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:s;}
function oM(){document.getElementById('ei').value='';document.getElementById('mt2').textContent='Novo Registro';['fn','di','df','fo'].forEach(i=>document.getElementById(i).value='');document.getElementById('flo').value='';document.getElementById('fst').value='Em Andamento';document.querySelectorAll('input[name="mot"]').forEach(r=>r.checked=false);document.getElementById('mo').classList.add('o');}
function eR(id){const r=recs[id];if(!r)return;document.getElementById('ei').value=id;document.getElementById('mt2').textContent='Editar';document.getElementById('fn').value=r.nome||'';document.getElementById('flo').value=r.loja||'';document.getElementById('di').value=r.dataInicio||'';document.getElementById('df').value=r.dataFim||'';document.getElementById('fst').value=r.status||'Em Andamento';document.getElementById('fo').value=r.obs||'';document.querySelectorAll('input[name="mot"]').forEach(x=>x.checked=x.value===r.motivo);document.getElementById('mo').classList.add('o');}
function cM(){document.getElementById('mo').classList.remove('o');}
function cDF(){const i=document.getElementById('di').value;if(!i)return;const m=document.querySelector('input[name="mot"]:checked');if(!m)return;let d=0;if(m.value==='empresa23dias')d=22;else if(m.value==='empresaReducao2h'||m.value==='colaborador')d=29;const dt=new Date(i+'T00:00:00');dt.setDate(dt.getDate()+d);document.getElementById('df').value=dt.toISOString().split('T')[0];}
function sR(){const n=(document.getElementById('fn').value||'').trim(),m=document.querySelector('input[name="mot"]:checked'),i=document.getElementById('di').value;if(!n){alert('Informe o nome.');return;}if(!m){alert('Selecione o motivo.');return;}if(!i	{alert('Informe a data de início.');return;}const p={nome:n,motivo:m.value,loja:document.getElementById('flo').value||'-',dataInicio:i,dataFim:document.getElementById('df').value||i,status:document.getElementById('fst').value||'Em Andamento',obs:document.getElementById('fo').value||'',atualizadoEm:Date.now()};const eid=document.getElementById('ei').value;const ref=eid?db.ref('avisos_trabalhados/'+eid):db.ref('avisos_trabalhados').push();if(!eid)p.criadoEm=Date.now();(eid?ref.update(p):ref.set(p)).then(()=>cM()).catch(e=>alert(e.message));}
function co(id){if(!confirm('Marcar como concluído?'))return;db.ref('avisos_trabalhados/'+id).update({status:'Concluido'});}
function dR(id){if(!confirm('Excluir?'))return;db.ref('avisos_trabalhados/'+id).remove();}
function sv(id,btn){document.querySelectorAll('.vi').forEach(v=>v.classList.remove('a'));document.querySelectorAll('.nb').forEach(b=>b.classList.remove('a'));document.getElementById('v'+id).classList.add('a');btn.classList.add('a');if(id==='d')rD();}
</script>
</body>
</html>
